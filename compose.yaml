services:
  hostbin:
    build:
      context: .
      dockerfile: Dockerfile
    image: hostbin:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      BASE_DOMAIN: ${BASE_DOMAIN:?BASE_DOMAIN is required}
      ADMIN_HOST: ${ADMIN_HOST:?ADMIN_HOST is required}
      PRESHARED_KEY: ${PRESHARED_KEY:?PRESHARED_KEY is required}
      DB_PATH: /var/lib/hostbin/data.db
      RESERVED_SUBDOMAINS: ${RESERVED_SUBDOMAINS:-admin,www,api}
      MAX_DOC_SIZE: ${MAX_DOC_SIZE:-1048576}
      AUTH_TIMESTAMP_SKEW_SECONDS: ${AUTH_TIMESTAMP_SKEW_SECONDS:-60}
      NONCE_TTL_SECONDS: ${NONCE_TTL_SECONDS:-300}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/var/lib/hostbin
