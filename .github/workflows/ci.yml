name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            **/go.sum

      - name: Run test suite
        run: make test

  build-linux:
    name: Build ${{ matrix.binary }} linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: hostbin
            target: ./cmd/server
            output: hostbin-linux-amd64
            goarch: amd64
          - binary: hostbin
            target: ./cmd/server
            output: hostbin-linux-arm64
            goarch: arm64
          - binary: hbcli
            target: ./cmd/hbcli
            output: hbcli-linux-amd64
            goarch: amd64
          - binary: hbcli
            target: ./cmd/hbcli
            output: hbcli-linux-arm64
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Capture cache target
        run: printf 'linux/%s\n' '${{ matrix.goarch }}' > .go-cache-target

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            **/go.sum
            .go-cache-target

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags='-s -w' -o dist/${{ matrix.output }} ${{ matrix.target }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error
