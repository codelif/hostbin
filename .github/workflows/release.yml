name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux:
    name: Build ${{ matrix.binary }} linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: hostbin
            target: ./cmd/server
            output: hostbin-linux-amd64
            goarch: amd64
          - binary: hostbin
            target: ./cmd/server
            output: hostbin-linux-arm64
            goarch: arm64
          - binary: hbcli
            target: ./cmd/hbcli
            output: hbcli-linux-amd64
            goarch: amd64
          - binary: hbcli
            target: ./cmd/hbcli
            output: hbcli-linux-arm64
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Capture cache target
        run: printf 'linux/%s\n' '${{ matrix.goarch }}' > .go-cache-target

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            **/go.sum
            .go-cache-target

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags='-s -w' -o dist/${{ matrix.output }} ${{ matrix.target }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build-linux
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/raw
          pattern: '*-linux-*'
          merge-multiple: true

      - name: Package release assets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release staging

          package_binary() {
            binary_name="$1"
            goarch="$2"
            source_file="dist/raw/${binary_name}-linux-${goarch}"
            package_dir="staging/${binary_name}_${TAG}_linux_${goarch}"
            archive_path="release/${binary_name}_${TAG}_linux_${goarch}.tar.gz"

            mkdir -p "$package_dir"
            cp "$source_file" "$package_dir/$binary_name"
            cp README.md "$package_dir/README.md"
            cp LICENSE "$package_dir/LICENSE"
            tar -C staging -czf "$archive_path" "$(basename "$package_dir")"
            rm -rf "$package_dir"
          }

          package_binary hostbin amd64
          package_binary hostbin arm64
          package_binary hbcli amd64
          package_binary hbcli arm64

          sha256sum release/*.tar.gz > release/SHA256SUMS

      - name: Create draft release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            Thanks for trying this release.
          files: |
            release/*.tar.gz
            release/SHA256SUMS
          fail_on_unmatched_files: true
